<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quiz TENS 💙</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

.container {
    max-width: 750px;
    margin: auto;
    padding: 20px;
}

button {
    display: block;
    width: 100%;
    margin: 8px 0;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #334155;
    color: white;
    cursor: pointer;
}

.correct { background: #22c55e !important; }
.wrong { background: #ef4444 !important; }

#nextBtn {
    margin-top: 10px;
    background: #3b82f6;
}
</style>
</head>

<body>

<div class="container">
<div id="app"></div>
</div>

<script>

let ramoActual = "";
let actual = 0;
let puntaje = 0;
let respondido = false;

/* =========================
   BANCO (15 PREGUNTAS)
========================= */

const banco = {

anatomia: [
{p:"Función glóbulos rojos", o:["Defensa","Oxígeno","Hormonas","Coagulación"], r:1},
{p:"Sistema respiratorio", o:["Pulmones","Hígado","Riñón","Páncreas"], r:0},
{p:"Sistema nervioso", o:["Cerebro","Corazón","Hígado","Estómago"], r:0},
{p:"Intercambio gaseoso", o:["Alvéolos","Bronquios","Tráquea","Nariz"], r:0},
{p:"Hueso más largo", o:["Fémur","Radio","Tibia","Húmero"], r:0},
{p:"Unidad básica", o:["Célula","Tejido","Órgano","Sistema"], r:0},
{p:"Órgano visión", o:["Ojo","Oído","Nariz","Lengua"], r:0},
{p:"Sistema inmune", o:["Defensa","Digestivo","Óseo","Muscular"], r:0},
{p:"Columna vertebral", o:["Esqueleto","Brazo","Pierna","Cabeza"], r:0},
{p:"Pulmones", o:["Respiratorio","Digestivo","Circulatorio","Nervioso"], r:0},
{p:"Sangre transporta", o:["Oxígeno","Huesos","Tejidos","Agua"], r:0},
{p:"Corazón función", o:["Bombear","Respirar","Filtrar","Mover"], r:0},
{p:"Sistema óseo", o:["Soporte","Respirar","Digestión","Filtrar"], r:0},
{p:"Músculos", o:["Movimiento","Pensar","Respirar","Filtrar"], r:0},
{p:"Digestivo inicia en", o:["Boca","Estómago","Intestino","Esófago"], r:0}
],

aps: [
{p:"APS significa", o:["Atención primaria","Privada","UCI","Emergencia"], r:0},
{p:"Objetivo APS", o:["Prevención","Cirugía","Urgencia","Hospital"], r:0},
{p:"CESFAM", o:["Primario","Terciario","UCI","Privado"], r:0},
{p:"Vacunación", o:["Prevención","Tratamiento","Cirugía","Diagnóstico"], r:0},
{p:"Control sano", o:["Seguimiento","Urgencia","Cirugía","Alta"], r:0},
{p:"APS trabaja con", o:["Comunidad","Hospital","UCI","Quirófano"], r:0},
{p:"Educación salud", o:["Prevenir","Curar","Operar","Internar"], r:0},
{p:"Niño sano", o:["APS","Urgencia","Cirugía","UCI"], r:0},
{p:"Promoción", o:["Hábitos","Cirugía","Medicamentos","Hospital"], r:0},
{p:"Prevención evita", o:["Enfermedad","Cirugía","Medicamentos","UCI"], r:0},
{p:"Nivel APS", o:["Primario","Secundario","Terciario","Crítico"], r:0},
{p:"CESFAM", o:["Centro salud","Hospital","Clínica","Laboratorio"], r:0},
{p:"Primer contacto", o:["APS","UCI","Cirugía","Hospital"], r:0},
{p:"Comunidad", o:["APS","UCI","Cirugía","Hospital"], r:0},
{p:"Prevención secundaria", o:["Detecta","Cirugía","Muerte","Nada"], r:0}
],

farmaco: [
{p:"Dosis es", o:["Cantidad","Tiempo","Tipo","Error"], r:0},
{p:"RAM", o:["Reacción adversa","Registro","Respuesta","Revisión"], r:0},
{p:"Antibiótico", o:["Bacterias","Virus","Dolor","Fiebre"], r:0},
{p:"Vía IM", o:["Intramuscular","Intravenosa","Oral","Subcutánea"], r:0},
{p:"Vencido", o:["No usar","Usar","Duplicar","Diluir"], r:0},
{p:"Paracetamol", o:["Dolor","Infección","Virus","Cirugía"], r:0},
{p:"Dosis depende", o:["Paciente","Color","Marca","Hora"], r:0},
{p:"Antiinflamatorio", o:["Inflamación","Sueño","Vista","Respiración"], r:0},
{p:"Vía oral", o:["Boca","Piel","Músculo","Vena"], r:0},
{p:"IV", o:["Intravenosa","Intramuscular","Oral","Subcutánea"], r:0},
{p:"Genérico", o:["Equivalente","Falso","Vencido","Diluido"], r:0},
{p:"Analgésico", o:["Dolor","Fiebre","Virus","Infección"], r:0},
{p:"Antipirético", o:["Fiebre","Dolor","Presión","Azúcar"], r:0},
{p:"Farmacología", o:["Medicamentos","Huesos","Sangre","Virus"], r:0},
{p:"Interacción", o:["Fármacos","Herida","Virus","Diagnóstico"], r:0}
]

};

/* =========================
   INICIO
========================= */

window.onload = () => {
    inicio();
};

/* =========================
   MENSAJE INICIAL
========================= */

function inicio(){

    document.getElementById("app").innerHTML = `
        <h2>💛 Para ti Pollito 💛</h2>

        <p>
        Esta pagina la realice con mucho cariño para ti Princesa. Recuerda que eres una Mujer Super Inteligente y Fuerte.💛<br><br>
        Este pequeño test es para que sigas creciendo en tu carrera.<br><br>
        No es solo una evaluación… es un recordatorio de lo lejos que puedes llegar.<br><br>
        TE AMO MI NIÑA.💛<br><br>
        </p>

        <button onclick="menu()">Siguiente</button>
    `;
}

/* =========================
   MENÚ
========================= */

function menu(){

    let guardado = localStorage.getItem("ultimoPuntaje");

    document.getElementById("app").innerHTML = `
        <h2>💛 Quiz TENS 💛</h2>

        <p>Último puntaje: ${guardado ?? "No registrado"}</p>

        <button onclick="iniciar('anatomia')">Anatomía</button>
        <button onclick="iniciar('aps')">APS</button>
        <button onclick="iniciar('farmaco')">Farmacología</button>
    `;
}

/* =========================
   INICIAR
========================= */

function iniciar(ramo){

    ramoActual = ramo;
    actual = 0;
    puntaje = 0;

    banco[ramoActual].sort(() => Math.random() - 0.5);

    cargar();
}

/* =========================
   CARGAR (🔥 FIX REAL)
========================= */

function cargar(){

    respondido = false;

    let p = banco[ramoActual][actual];

    // 🔥 aquí está la clave: mezclar OBJETOS completos
    let opciones = p.o.map((texto, i) => ({
        texto,
        correcta: i === p.r
    }));

    opciones.sort(() => Math.random() - 0.5);

    let html = `<h3>${p.p}</h3>`;

    opciones.forEach((op, i) => {
        html += `<button onclick="responder(this, ${op.correcta})">${op.texto}</button>`;
    });

    html += `<button id="nextBtn" disabled onclick="siguiente()">Siguiente</button>`;

    document.getElementById("app").innerHTML = html;
}

/* =========================
   RESPONDER (🔥 FIX REAL)
========================= */

function responder(btn, correcta){

    if(respondido) return;
    respondido = true;

    let botones = document.querySelectorAll("#app button");

    botones.forEach(b => b.disabled = true);

    if(correcta){
        btn.classList.add("correct");
        puntaje++;
    } else {
        btn.classList.add("wrong");
    }

    document.getElementById("nextBtn").disabled = false;
}

/* =========================
   SIGUIENTE
========================= */

function siguiente(){

    actual++;

    if(actual < banco[ramoActual].length){
        cargar();
    } else {

        let nota = ((puntaje / banco[ramoActual].length) * 6) + 1;

        localStorage.setItem("ultimoPuntaje", puntaje);

        document.getElementById("app").innerHTML = `
            <h2>🎉 Resultado final 🎉</h2>

            <h3>Puntaje: ${puntaje}/${banco[ramoActual].length}</h3>
            <h3>Nota: ${nota.toFixed(1)}</h3>

            <h3>${nota >= 4 ? "✅ Aprobado" : "❌ Reprobado"}</h3>

            <button onclick="iniciar(ramoActual)">🔁 Reintentar</button>
            <button onclick="menu()">🏠 Volver</button>
        `;
    }
}

</script>

</body>
</html>
