<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para mi TENS favorita 💙</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}
.container {
    max-width: 600px;
    margin: auto;
    padding: 20px;
}
button {
    display: block;
    width: 100%;
    margin: 8px 0;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #334155;
    color: white;
    cursor: pointer;
}
.correct { background: #22c55e; }
.wrong { background: #ef4444; }
</style>
</head>

<body>

<div class="container">
    <h2>💙 Bienvenida mi vida 💙</h2>
    <h3>Evaluación TENS</h3>

    <div id="quiz"></div>

    <button onclick="siguiente()">Siguiente</button>

    <h3 id="resultado"></h3>
</div>

<script>

let puntaje = 0;
let respondido = false;

const API_URL = "https://app-tens.vercel.app/api/pregunta";

async function cargarPregunta() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();

        let html = `<h3>${data.pregunta}</h3>`;

        data.opciones.forEach((op, i) => {
            html += `<button onclick="responder(${i}, ${data.correcta})">${op}</button>`;
        });

        document.getElementById("quiz").innerHTML = html;

        respondido = false;

    } catch (error) {
        document.getElementById("quiz").innerHTML =
        "<h3>Error al cargar pregunta 😢</h3>";
    }
}

function responder(i, correcta) {

    if(respondido) return;
    respondido = true;

    let botones = document.querySelectorAll("#quiz button");

    botones.forEach((btn, index) => {
        if(index === correcta) btn.classList.add("correct");
        if(index === i && i !== correcta) btn.classList.add("wrong");
        btn.disabled = true;
    });

    if(i === correcta) puntaje++;

    document.getElementById("resultado").innerHTML =
    `Puntaje: ${puntaje}`;
}

function siguiente() {
    if(!respondido) return;
    cargarPregunta();
}

cargarPregunta();

</script>

</body>
</html>
