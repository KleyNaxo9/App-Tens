<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quiz TENS 💙</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

.container {
    max-width: 750px;
    margin: auto;
    padding: 20px;
}

button {
    display: block;
    width: 100%;
    margin: 8px 0;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #334155;
    color: white;
    cursor: pointer;
}

.correct { background: #22c55e !important; }
.wrong { background: #ef4444 !important; }

#nextBtn {
    margin-top: 10px;
    background: #3b82f6;
}
</style>
</head>

<body>

<div class="container">
<h2>💛 Evaluación TENS 💛</h2>
<div id="app"></div>
</div>

<script>

let ramoActual = "";
let actual = 0;
let puntaje = 0;
let respondido = false;
let opcionesActuales = [];

/* =========================
   BANCO DE PREGUNTAS
========================= */

const banco = {

anatomia: [
{p:"Función de los glóbulos rojos", o:["Defensa","Oxígeno","Hormonas","Coagulación"], r:"Oxígeno"},
{p:"Sistema respiratorio principal", o:["Pulmones","Hígado","Riñones","Páncreas"], r:"Pulmones"},
{p:"Órgano del sistema nervioso", o:["Cerebro","Corazón","Hígado","Estómago"], r:"Cerebro"},
{p:"Intercambio gaseoso ocurre en", o:["Alvéolos","Bronquios","Tráquea","Nariz"], r:"Alvéolos"},
{p:"Hueso más largo del cuerpo", o:["Fémur","Radio","Tibia","Húmero"], r:"Fémur"}
],

aps: [
{p:"APS significa", o:["Atención primaria de salud","Privada","UCI","Emergencia"], r:"Atención primaria de salud"},
{p:"Objetivo APS", o:["Prevención","Cirugía","Urgencia","Hospital"], r:"Prevención"},
{p:"CESFAM es", o:["Nivel primario","Terciario","UCI","Privado"], r:"Nivel primario"},
{p:"Vacunación es", o:["Prevención","Tratamiento","Cirugía","Diagnóstico"], r:"Prevención"},
{p:"Control sano es", o:["Seguimiento","Urgencia","Cirugía","Alta"], r:"Seguimiento"}
],

farmaco: [
{p:"Qué es dosis", o:["Cantidad","Tiempo","Tipo","Error"], r:"Cantidad"},
{p:"RAM significa", o:["Reacción adversa","Registro","Respuesta","Revisión"], r:"Reacción adversa"},
{p:"Antibióticos actúan sobre", o:["Bacterias","Virus","Dolor","Fiebre"], r:"Bacterias"},
{p:"Vía IM es", o:["Intramuscular","Intravenosa","Oral","Subcutánea"], r:"Intramuscular"},
{p:"Paracetamol sirve para", o:["Dolor","Infección","Virus","Cirugía"], r:"Dolor"}
]

};

/* =========================
   INICIO
========================= */

function inicio(){
    document.getElementById("app").innerHTML = `
        <h2>💛 Para ti 💛</h2>

        <p>
        Esta pagina la realice con mucho cariño para ti Princesa. Recuerda que eres una Mujer Super Inteligente y Fuerte.💛<br><br>
        Este pequeño test es para que sigas creciendo en tu carrera.<br><br>
        No es solo una evaluación… es un recordatorio de lo lejos que puedes llegar.<br><br>
        TE AMO MI NIÑA.💛<br><br>
        </p>

        <button onclick="menu()">Siguiente</button>
    `;
}

/* =========================
   MENÚ
========================= */

function menu(){

    let guardado = localStorage.getItem("ultimoPuntaje");

    document.getElementById("app").innerHTML = `
        <h3>Elige un ramo</h3>

        <p>Último puntaje: ${guardado ?? "No registrado"}</p>

        <button onclick="iniciar('anatomia')">Anatomía</button>
        <button onclick="iniciar('aps')">APS</button>
        <button onclick="iniciar('farmaco')">Farmacología</button>
    `;
}

/* =========================
   INICIAR
========================= */

function iniciar(ramo){
    ramoActual = ramo;

    banco[ramoActual].sort(() => Math.random() - 0.5);

    actual = 0;
    puntaje = 0;

    cargar();
}

/* =========================
   CARGAR
========================= */

function cargar(){

    respondido = false;

    let p = banco[ramoActual][actual];

    // 🔀 mezclar opciones
    opcionesActuales = [...p.o].sort(() => Math.random() - 0.5);

    let html = `<h3>${p.p}</h3>`;

    opcionesActuales.forEach(op => {
        html += `<button onclick="responder('${op}')">${op}</button>`;
    });

    html += `<button id="nextBtn" disabled onclick="siguiente()">Siguiente</button>`;

    document.getElementById("app").innerHTML = html;
}

/* =========================
   RESPONDER
========================= */

function responder(opcion){

    if(respondido) return;
    respondido = true;

    let p = banco[ramoActual][actual];

    let botones = document.querySelectorAll("#app button");

    botones.forEach(b => {

        if(b.textContent === p.r){
            b.classList.add("correct");
        }

        if(b.textContent === opcion && opcion !== p.r){
            b.classList.add("wrong");
        }

        b.disabled = true;
    });

    if(opcion === p.r){
        puntaje++;
    }

    document.getElementById("nextBtn").disabled = false;
}

/* =========================
   SIGUIENTE
========================= */

function siguiente(){

    actual++;

    if(actual < banco[ramoActual].length){
        cargar();
    } else {

        let nota = ((puntaje / banco[ramoActual].length) * 6) + 1;

        localStorage.setItem("ultimoPuntaje", puntaje);

        document.getElementById("app").innerHTML = `
            <h2>🎉 Resultado final 🎉</h2>

            <h3>Puntaje: ${puntaje}/${banco[ramoActual].length}</h3>
            <h3>Nota: ${nota.toFixed(1)}</h3>

            <h3>${nota >= 4 ? "✅ Aprobado" : "❌ Reprobado"}</h3>

            <button onclick="iniciar(ramoActual)">🔁 Reintentar ramo</button>
            <button onclick="menu()">🏠 Volver al menú</button>
        `;
    }
}

/* INICIO */
inicio();

</script>

</body>
</html>
